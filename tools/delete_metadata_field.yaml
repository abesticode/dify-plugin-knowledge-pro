identity:
  name: delete_metadata_field
  author: abesticode
  label:
    en_US: Delete Metadata Field
    zh_Hans: 删除元数据字段
    pt_BR: Excluir Campo de Metadados
    ja_JP: メタデータフィールド削除
description:
  human:
    en_US: Delete a metadata field from a Dify knowledge base
    zh_Hans: 从Dify知识库删除元数据字段
    pt_BR: Excluir um campo de metadados de uma base de conhecimento Dify
    ja_JP: Difyナレッジベースからメタデータフィールドを削除します
  llm: Permanently deletes a metadata field from a knowledge base. WARNING - This action is irreversible and will remove the field from all documents. Use list_metadata to get the metadata_id.
parameters:
  - name: dataset_id
    type: string
    required: true
    label:
      en_US: Dataset ID
      zh_Hans: 数据集ID
      pt_BR: ID do Dataset
      ja_JP: データセットID
    human_description:
      en_US: The ID of the dataset containing the metadata field
      zh_Hans: 包含元数据字段的数据集ID
      pt_BR: O ID do dataset contendo o campo de metadados
      ja_JP: メタデータフィールドを含むデータセットのID
    llm_description: The unique identifier (ID) of the dataset containing the metadata field.
    form: llm
  - name: metadata_id
    type: string
    required: true
    label:
      en_US: Metadata ID
      zh_Hans: 元数据ID
      pt_BR: ID do Metadados
      ja_JP: メタデータID
    human_description:
      en_US: The ID of the metadata field to delete
      zh_Hans: 要删除的元数据字段ID
      pt_BR: O ID do campo de metadados a ser excluído
      ja_JP: 削除するメタデータフィールドのID
    llm_description: The unique identifier (ID) of the metadata field to delete. Use list_metadata to get available metadata IDs. WARNING - This action permanently deletes the field.
    form: llm
  - name: api_key
    type: secret-input
    required: true
    label:
      en_US: API Key
      zh_Hans: API密钥
      pt_BR: Chave da API
      ja_JP: APIキー
    human_description:
      en_US: Optional. Override the default API key configured in Authorization settings. Leave empty to use the default.
      zh_Hans: 可选。覆盖授权设置中配置的默认API密钥。留空则使用默认值。
      pt_BR: Opcional. Substituir a chave da API padrão configurada nas configurações de Autorização. Deixe vazio para usar o padrão.
      ja_JP: オプション。認証設定のデフォルトAPIキーを上書きします。空の場合デフォルトを使用。
    llm_description: Optional API key to override the default from Authorization settings. Leave empty to use the default.
    form: form
  - name: base_url
    type: string
    required: true
    label:
      en_US: Base URL
      zh_Hans: 基础URL
      pt_BR: URL Base
      ja_JP: ベースURL
    human_description:
      en_US: 'The base URL of your Dify API (e.g. https://api.dify.ai/v1).'
      zh_Hans: 'Dify API的基础URL（例如 https://api.dify.ai/v1）。'
      pt_BR: 'A URL base da sua API Dify (ex. https://api.dify.ai/v1).'
      ja_JP: 'Dify APIのベースURL（例 https://api.dify.ai/v1）。'
    llm_description: Optional base URL to override the default from Authorization settings. Leave empty to use the default.
    form: form
extra:
  python:
    source: tools/delete_metadata_field.py
