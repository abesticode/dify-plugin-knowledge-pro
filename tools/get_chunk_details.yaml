identity:
  name: get_chunk_details
  author: abesticode
  label:
    en_US: Get Chunk Details
    zh_Hans: 获取分段详情
    pt_BR: Obter Detalhes do Chunk
    ja_JP: チャンク詳細取得
description:
  human:
    en_US: Get detailed information of a specific chunk/segment from a document
    zh_Hans: 获取文档中特定分段的详细信息
    pt_BR: Obter informações detalhadas de um chunk/segmento específico de um documento
    ja_JP: ドキュメントの特定のチャンク/セグメントの詳細情報を取得
  llm: Retrieves complete details of a specific chunk including content, word count, tokens, keywords, hit count, indexing status, and timestamps.
parameters:
  - name: dataset_id
    type: string
    required: true
    label:
      en_US: Dataset ID
      zh_Hans: 数据集ID
      pt_BR: ID do Dataset
      ja_JP: データセットID
    human_description:
      en_US: The ID of the knowledge base
      zh_Hans: 知识库的ID
      pt_BR: O ID da base de conhecimento
      ja_JP: ナレッジベースのID
    llm_description: The unique identifier of the dataset/knowledge base.
    form: llm
  - name: document_id
    type: string
    required: true
    label:
      en_US: Document ID
      zh_Hans: 文档ID
      pt_BR: ID do Documento
      ja_JP: ドキュメントID
    human_description:
      en_US: The ID of the document containing the chunk
      zh_Hans: 包含分段的文档ID
      pt_BR: O ID do documento contendo o chunk
      ja_JP: チャンクを含むドキュメントのID
    llm_description: The unique identifier of the document.
    form: llm
  - name: segment_id
    type: string
    required: true
    label:
      en_US: Segment ID
      zh_Hans: 分段ID
      pt_BR: ID do Segmento
      ja_JP: セグメントID
    human_description:
      en_US: The ID of the chunk/segment to retrieve details
      zh_Hans: 要获取详情的分段ID
      pt_BR: O ID do chunk/segmento para obter detalhes
      ja_JP: 詳細を取得するチャンク/セグメントのID
    llm_description: The unique identifier of the chunk/segment.
    form: llm
  - name: api_key
    type: secret-input
    required: true
    label:
      en_US: API Key
      zh_Hans: API密钥
      pt_BR: Chave da API
      ja_JP: APIキー
    human_description:
      en_US: Optional. Override the default API key configured in Authorization settings. Leave empty to use the default.
      zh_Hans: 可选。覆盖授权设置中配置的默认API密钥。留空则使用默认值。
      pt_BR: Opcional. Substituir a chave da API padrão configurada nas configurações de Autorização. Deixe vazio para usar o padrão.
      ja_JP: オプション。認証設定のデフォルトAPIキーを上書きします。空の場合デフォルトを使用。
    llm_description: Optional API key to override the default from Authorization settings. Leave empty to use the default.
    form: form
  - name: base_url
    type: string
    required: true
    label:
      en_US: Base URL
      zh_Hans: 基础URL
      pt_BR: URL Base
      ja_JP: ベースURL
    human_description:
      en_US: 'The base URL of your Dify API (e.g. https://api.dify.ai/v1).'
      zh_Hans: 'Dify API的基础URL（例如 https://api.dify.ai/v1）。'
      pt_BR: 'A URL base da sua API Dify (ex. https://api.dify.ai/v1).'
      ja_JP: 'Dify APIのベースURL（例 https://api.dify.ai/v1）。'
    llm_description: Optional base URL to override the default from Authorization settings. Leave empty to use the default.
    form: form
extra:
  python:
    source: tools/get_chunk_details.py
