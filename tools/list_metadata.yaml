identity:
  name: list_metadata
  author: abesticode
  label:
    en_US: List Metadata Fields
    zh_Hans: 列出元数据字段
    pt_BR: Listar Campos de Metadados
    ja_JP: メタデータフィールド一覧
description:
  human:
    en_US: Get the list of metadata fields in a Dify knowledge base
    zh_Hans: 获取Dify知识库中的元数据字段列表
    pt_BR: Obter a lista de campos de metadados em uma base de conhecimento Dify
    ja_JP: Difyナレッジベース内のメタデータフィールドリストを取得します
  llm: Retrieves all metadata fields defined in a knowledge base. Returns field information including IDs, names, types, and usage counts. Also indicates whether built-in fields are enabled.
parameters:
  - name: dataset_id
    type: string
    required: true
    label:
      en_US: Dataset ID
      zh_Hans: 数据集ID
      pt_BR: ID do Dataset
      ja_JP: データセットID
    human_description:
      en_US: The ID of the dataset to list metadata fields from
      zh_Hans: 要列出元数据字段的数据集ID
      pt_BR: O ID do dataset para listar campos de metadados
      ja_JP: メタデータフィールドを一覧表示するデータセットのID
    llm_description: The unique identifier (ID) of the dataset to list metadata fields from. Use list_datasets to get available dataset IDs.
    form: llm
  - name: api_key
    type: secret-input
    required: true
    label:
      en_US: API Key
      zh_Hans: API密钥
      pt_BR: Chave da API
      ja_JP: APIキー
    human_description:
      en_US: Optional. Override the default API key configured in Authorization settings. Leave empty to use the default.
      zh_Hans: 可选。覆盖授权设置中配置的默认API密钥。留空则使用默认值。
      pt_BR: Opcional. Substituir a chave da API padrão configurada nas configurações de Autorização. Deixe vazio para usar o padrão.
      ja_JP: オプション。認証設定のデフォルトAPIキーを上書きします。空の場合デフォルトを使用。
    llm_description: Optional API key to override the default from Authorization settings. Leave empty to use the default.
    form: form
  - name: base_url
    type: string
    required: true
    label:
      en_US: Base URL
      zh_Hans: 基础URL
      pt_BR: URL Base
      ja_JP: ベースURL
    human_description:
      en_US: 'The base URL of your Dify API (e.g. https://api.dify.ai/v1).'
      zh_Hans: 'Dify API的基础URL（例如 https://api.dify.ai/v1）。'
      pt_BR: 'A URL base da sua API Dify (ex. https://api.dify.ai/v1).'
      ja_JP: 'Dify APIのベースURL（例 https://api.dify.ai/v1）。'
    llm_description: Optional base URL to override the default from Authorization settings. Leave empty to use the default.
    form: form
extra:
  python:
    source: tools/list_metadata.py
