identity:
  name: delete_dataset
  author: abesticode
  label:
    en_US: Delete Dataset
    zh_Hans: 删除数据集
    pt_BR: Excluir Dataset
    ja_JP: データセット削除
description:
  human:
    en_US: Delete a knowledge base (dataset) from Dify
    zh_Hans: 从Dify删除知识库（数据集）
    pt_BR: Excluir uma base de conhecimento (dataset) do Dify
    ja_JP: Difyからナレッジベース（データセット）を削除します
  llm: Permanently deletes a knowledge base (dataset) from Dify. WARNING - This action is irreversible and will delete all documents and chunks within the dataset.,Use list_datasets first to get the dataset ID.
parameters:
  - name: dataset_id
    type: string
    required: true
    label:
      en_US: Dataset ID
      zh_Hans: 数据集ID
      pt_BR: ID do Dataset
      ja_JP: データセットID
    human_description:
      en_US: The ID of the dataset to delete
      zh_Hans: 要删除的数据集的ID
      pt_BR: O ID do dataset a ser excluído
      ja_JP: 削除するデータセットのID
    llm_description: The unique identifier (ID) of the dataset to delete. You can get this ID from the list_datasets tool. WARNING - This action permanently deletes the dataset and all its contents.
    form: llm
  - name: api_key
    type: secret-input
    required: true
    label:
      en_US: API Key
      zh_Hans: API密钥
      pt_BR: Chave da API
      ja_JP: APIキー
    human_description:
      en_US: Optional. Override the default API key configured in Authorization settings. Leave empty to use the default.
      zh_Hans: 可选。覆盖授权设置中配置的默认API密钥。留空则使用默认值。
      pt_BR: Opcional. Substituir a chave da API padrão configurada nas configurações de Autorização. Deixe vazio para usar o padrão.
      ja_JP: オプション。認証設定のデフォルトAPIキーを上書きします。空の場合デフォルトを使用。
    llm_description: Optional API key to override the default from Authorization settings. Leave empty to use the default.
    form: form
  - name: base_url
    type: string
    required: true
    label:
      en_US: Base URL
      zh_Hans: 基础URL
      pt_BR: URL Base
      ja_JP: ベースURL
    human_description:
      en_US: 'The base URL of your Dify API (e.g. https://api.dify.ai/v1).'
      zh_Hans: 'Dify API的基础URL（例如 https://api.dify.ai/v1）。'
      pt_BR: 'A URL base da sua API Dify (ex. https://api.dify.ai/v1).'
      ja_JP: 'Dify APIのベースURL（例 https://api.dify.ai/v1）。'
    llm_description: Optional base URL to override the default from Authorization settings. Leave empty to use the default.
    form: form
extra:
  python:
    source: tools/delete_dataset.py
