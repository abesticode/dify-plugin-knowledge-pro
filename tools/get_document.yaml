identity:
  name: get_document
  author: abesticode
  label:
    en_US: Get Document
    zh_Hans: 获取文档详情
description:
  human:
    en_US: Get detailed information about a specific document in a knowledge base
    zh_Hans: 获取知识库中特定文档的详细信息
  llm: Retrieves detailed information about a specific document in a knowledge base by its ID. Includes indexing status, metadata, and processing statistics.
parameters:
  - name: dataset_id
    type: string
    required: true
    label:
      en_US: Dataset ID
      zh_Hans: 数据集ID
    human_description:
      en_US: The ID of the knowledge base
      zh_Hans: 知识库ID
    llm_description: The unique identifier (ID) of the dataset.
    form: llm
  - name: document_id
    type: string
    required: true
    label:
      en_US: Document ID
      zh_Hans: 文档ID
    human_description:
      en_US: The ID of the document
      zh_Hans: 文档ID
    llm_description: The unique identifier (ID) of the document to retrieve.
    form: llm
  - name: metadata_filter
    type: select
    required: false
    default: all
    label:
      en_US: Metadata Filter
      zh_Hans: 元数据过滤
    human_description:
      en_US: Filter how metadata is returned
      zh_Hans: 过滤返回的元数据内容
    llm_description: "all returns all fields including metadata. only returns only id, doc_type, and doc_metadata. without returns all fields except doc_metadata."
    form: llm
    options:
      - value: all
        label:
          en_US: All
      - value: only
        label:
          en_US: Only Metadata
      - value: without
        label:
          en_US: Without Metadata
extra:
  python:
    source: tools/get_document.py
